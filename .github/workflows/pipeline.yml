name: CI/CD Pipeline - Ansible Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ansible

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > /tmp/deploy_key.pem
          chmod 600 /tmp/deploy_key.pem
          ssh-keyscan -H ${{ secrets.SERVER_IP_1 }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.SERVER_IP_2 }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.SERVER_IP_3 }} >> ~/.ssh/known_hosts

      - name: Update inventory with server IPs
        run: |
          sed -i "s/YOUR_SERVER_IP_1/${{ secrets.SERVER_IP_1 }}/g" ansible/inventory.ini
          sed -i "s/YOUR_SERVER_IP_2/${{ secrets.SERVER_IP_2 }}/g" ansible/inventory.ini
          sed -i "s/YOUR_SERVER_IP_3/${{ secrets.SERVER_IP_3 }}/g" ansible/inventory.ini

      - name: Inject build number into HTML
        run: |
          sed -i "s/GITHUB_RUN_NUMBER/${{ github.run_number }}/g" app/index.html

      - name: Run Ansible deploy playbook
        run: |
          ansible-playbook ansible/deploy.yml \
            -i ansible/inventory.ini \
            -e "ansible_ssh_private_key_file=/tmp/deploy_key.pem"

      - name: Print success
        run: echo "Deployed build ${{ github.run_number }} to all 3 servers"